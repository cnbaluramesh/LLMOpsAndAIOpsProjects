apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-pvc
  namespace: logging
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: standard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      securityContext:
        fsGroup: 1000

      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10

          # 🔥 CRITICAL FIX (forces JVM flags properly)
          command:
            - sh
            - -c
            - |
              export ES_JAVA_OPTS="-Xms512m -Xmx512m -XX:-UseContainerSupport -Dlog4j2.disable.jmx=true"
              exec /usr/local/bin/docker-entrypoint.sh

          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: bootstrap.memory_lock
              value: "false"

          ports:
            - containerPort: 9200
            
          resources:
            limits:
              memory: "1Gi"
            requests:
              memory: "512Mi"

          volumeMounts:
            - mountPath: /usr/share/elasticsearch/data
              name: elasticsearch-storage

      volumes:
        - name: elasticsearch-storage
          persistentVolumeClaim:
            claimName: elasticsearch-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: logging
spec:
  selector:
    app: elasticsearch
  ports:
    - protocol: TCP
      port: 9200
      targetPort: 9200